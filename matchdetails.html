<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>

        Match Details

    </title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <header class="navbar">

        <div class="logo">

            🏏 CRICKET_SCORE_MASTER

        </div>

        <ul class="menu">

            <li>

            <li><a href="history.html" style="color:white;text-decoration:none;">

                    MY HISTORY

                </a></li>

            <li><a href="index.html" style="color:white;text-decoration:none;">

                    HOME

                </a></li>

            </li>

        </ul>

    </header>

    <section class="hero">

        <div class="hero-overlay">

            <div class="info-card">

                <h2 id="matchTitle">

                </h2>

                <h3 id="matchResult">

                </h3>

                <h3>

                    Player Of The Match :

                    <span id="potm">

                    </span>

                </h3>

                <hr>

                <h3>

                    1st Innings

                </h3>

                <h4 id="firstScore">

                </h4>

                <table id="firstBatting">

                    <thead>

                        <tr>

                            <th>Batter</th>
                            <th>Dismissal</th>
                            <th>R</th>
                            <th>B</th>
                            <th>4s</th>
                            <th>6s</th>
                            <th>SR</th>

                        </tr>

                    </thead>

                    <tbody>

                    </tbody>

                </table>

                <h4>Bowling Scorecard</h4>

                <table id="firstBowling">

                    <thead>

                        <tr>

                            <th>Bowler</th>
                            <th>O</th>
                            <th>R</th>
                            <th>W</th>
                            <th>Eco</th>

                        </tr>

                    </thead>

                    <tbody>

                    </tbody>

                </table>

                <hr>

                <h3>

                    2nd Innings

                </h3>

                <h4 id="secondScore">

                </h4>

                <h4>Batting Scorecard</h4>

                <table id="secondBatting">

                    <thead>

                        <tr>

                            <th>Batter</th>
                            <th>Dismissal</th>
                            <th>R</th>
                            <th>B</th>
                            <th>4s</th>
                            <th>6s</th>
                            <th>SR</th>

                        </tr>

                    </thead>

                    <tbody>

                    </tbody>

                </table>

                <h4>Bowling Scorecard</h4>

                <table id="secondBowling">

                    <thead>

                        <tr>

                            <th>Bowler</th>
                            <th>O</th>
                            <th>R</th>
                            <th>W</th>
                            <th>Eco</th>

                        </tr>

                    </thead>

                    <tbody>

                    </tbody>

                </table>

            </div>

        </div>

    </section>

    <script src="js/matchdetails.js"></script>

</body>

</html>
